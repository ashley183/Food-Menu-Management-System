<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Menu Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <h1><i class="fas fa-utensils"></i> Food Menu Manager</h1>
        </div>
    </header>

    <main class="container">
        <section id="category-section">
            <h2>Categories <button id="add-category-btn" class="btn btn-primary"><i class="fas fa-plus"></i> Add Category</button></h2>
            <div id="category-list" class="grid-container">
                <!-- Categories will be loaded here -->
            </div>
        </section>

        <section id="ingredients-section">
            <h2>Ingredients <button id="add-ingredient-btn" class="btn btn-primary"><i class="fas fa-plus"></i> Add Ingredient</button></h2>
            <div id="ingredient-list" class="grid-container">
                <!-- Ingredients will be loaded here -->
            </div>
        </section>

        <section id="menu-section">
            <h2 id="menu-title">Menu Items</h2>
            <div id="menu-list" class="grid-container">
                <!-- Menu items will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Modal for adding/editing categories/items -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">Add New</h2>
            <form id="modal-form">
                <!-- Form fields will be injected here -->
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
